<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monarch Data</title>

  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.js"></script>
  <script src="app.js" defer></script>
</head>

<body>
  <div id="app">
    <v-app>
      <v-app-bar-nav-icon @click="toggleOpenCloseopenDrawer"></v-app-bar-nav-icon>
        <v-app-bar-title>Coding Inquiry Portfolio</v-app-bar-title>
    </v-app-bar>
    
    <v-main>

              <v-container>
            <!-- <v-btn @click="toggleOpenCloseopenDrawer">openDrawer</v-btn> -->

            <v-navigation-drawer v-model="showopenDrawer">
                <v-list-item href="https://madsb04.github.io/Coding-Inquiry-Portfolio/">Home</v-list-item>
                <v-list-item v-for="item in projects" :key="item.title" :href="item.url">
                    {{item.title}}
                </v-list-item>
            </v-navigation-drawer>

      <v-container>


    <v-card v-for="item in MonarchPopulation" :key="item.title"]

      <v-card-title>{{ item.title }}</v-card-title>
      <v-card-subtitle>{{ item.subtitle }}</v-card-subtitle>

      <v-sparkline :model-value="item.trend" :labels="['2021', '2022', '2023']" padding ="16" auto-draw>
      </v-sparkline>

    </v-card>

          <v-stepper :items="EcologicalFactors">
        <template v-for ="(Factor, index) in EcologicalFactors" :key="Factor.title" v-slot:[step(index)]>
            <v-card>
                <v-card-title> {{Factor.title}} </v-card-title>
                <v-card-text> {{Factor.description}}</v-card-text>
            </v-card>
        </template>
      </v-stepper>

<v-data-table :items="RoostingPopulation"></v-data-table>

</v-container>
              </v-container>
</v-main>
</v-app>
</div>
</body>
</html>
